name: authway-app

# Phase 02 reference stack: 2 oauth2-proxy + 2 sample apps + Traefik
# Mỗi app 1 OIDC client riêng, 1 oauth2-proxy riêng, cookie-domain riêng.
# Cookie SSO cross-app KHÔNG có (TLD khác / public suffix); SSO qua Zitadel session.

networks:
  internal:
    driver: bridge
  edge:
    driver: bridge

volumes:
  traefik-logs:

services:
  # ── Traefik (sole ingress) ──────────────────────────────
  traefik:
    image: traefik:v3.4
    restart: unless-stopped
    networks: [edge]
    environment:
      DOCKER_API_VERSION: "1.43"
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8088:8080"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./tls:/etc/traefik/tls:ro
      - traefik-logs:/var/log/traefik
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── oauth2-proxy cho nextjs-demo ────────────────────────
  oauth2-proxy-nextjs:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    restart: unless-stopped
    networks: [edge, internal]
    command:
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --oidc-issuer-url=${ZITADEL_ISSUER_URL}
      - --client-id=${NEXTJS_CLIENT_ID}
      - --client-secret=${NEXTJS_CLIENT_SECRET}
      - --redirect-url=https://${NEXTJS_HOSTNAME}/oauth2/callback
      - --cookie-secret=${NEXTJS_COOKIE_SECRET}
      - --cookie-domain=${NEXTJS_HOSTNAME}
      - --cookie-secure=true
      - --cookie-refresh=1h     # red-team #10: revoke propagate <1h
      - --whitelist-domain=${ZITADEL_HOSTNAME}   # red-team #1: cho phép logout rd về Zitadel
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-access-token=false
      - --pass-authorization-header=false
      - --email-domain=*
      - --skip-provider-button=true
      - --upstream=http://nextjs-demo:3000
      - --ssl-insecure-skip-verify=true   # LAB ONLY: Zitadel cert self-signed
    extra_hosts:
      # Lab: container không thấy /etc/hosts host. Map ZITADEL_HOSTNAME → IP của auth VPS.
      - "${ZITADEL_HOSTNAME}:${ZITADEL_IP}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=authway-app_edge"
      - "traefik.http.routers.nextjs-auth.rule=Host(`${NEXTJS_HOSTNAME}`) && PathPrefix(`/oauth2`)"
      - "traefik.http.routers.nextjs-auth.entrypoints=websecure"
      - "traefik.http.routers.nextjs-auth.tls=true"
      - "traefik.http.routers.nextjs-auth.priority=10"
      - "traefik.http.services.oauth2-proxy-nextjs.loadbalancer.server.port=4180"

  # ── Next.js sample app ─────────────────────────────────
  nextjs-demo:
    build:
      context: ../../sample-apps/nextjs-iap-demo
    restart: unless-stopped
    networks: [internal]
    # No host port — internal docker network only (red-team #3)
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=authway-app_edge"
      - "traefik.http.routers.nextjs-app.rule=Host(`${NEXTJS_HOSTNAME}`)"
      - "traefik.http.routers.nextjs-app.entrypoints=websecure"
      - "traefik.http.routers.nextjs-app.tls=true"
      - "traefik.http.routers.nextjs-app.middlewares=nextjs-forwardauth@file,nextjs-auth-redirect@file"
      - "traefik.http.services.nextjs-app.loadbalancer.server.port=3000"

  # ── oauth2-proxy cho static-demo ──────────────────────
  oauth2-proxy-static:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    restart: unless-stopped
    networks: [edge, internal]
    command:
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --oidc-issuer-url=${ZITADEL_ISSUER_URL}
      - --client-id=${STATIC_CLIENT_ID}
      - --client-secret=${STATIC_CLIENT_SECRET}
      - --redirect-url=https://${STATIC_HOSTNAME}/oauth2/callback
      - --cookie-secret=${STATIC_COOKIE_SECRET}
      - --cookie-domain=${STATIC_HOSTNAME}
      - --cookie-secure=true
      - --cookie-refresh=1h
      - --whitelist-domain=${ZITADEL_HOSTNAME}
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-access-token=false
      - --email-domain=*
      - --skip-provider-button=true
      - --upstream=http://static-demo:80
      - --ssl-insecure-skip-verify=true
    extra_hosts:
      - "${ZITADEL_HOSTNAME}:${ZITADEL_IP}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=authway-app_edge"
      - "traefik.http.routers.static-auth.rule=Host(`${STATIC_HOSTNAME}`) && PathPrefix(`/oauth2`)"
      - "traefik.http.routers.static-auth.entrypoints=websecure"
      - "traefik.http.routers.static-auth.tls=true"
      - "traefik.http.routers.static-auth.priority=10"
      - "traefik.http.services.oauth2-proxy-static.loadbalancer.server.port=4180"

  # ── Static HTML sample app ─────────────────────────────
  static-demo:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks: [internal]
    volumes:
      - ../../sample-apps/static-iap-demo/html:/usr/share/nginx/html:ro
      - ../../sample-apps/static-iap-demo/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=authway-app_edge"
      - "traefik.http.routers.static-app.rule=Host(`${STATIC_HOSTNAME}`)"
      - "traefik.http.routers.static-app.entrypoints=websecure"
      - "traefik.http.routers.static-app.tls=true"
      - "traefik.http.routers.static-app.middlewares=static-forwardauth@file,static-auth-redirect@file"
      - "traefik.http.services.static-app.loadbalancer.server.port=80"
