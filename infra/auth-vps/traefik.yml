# Traefik static config — auth VPS
# Dynamic config (middlewares, routers per service) trong ./dynamic/ + Docker labels

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO
  # stdout — dễ debug qua docker compose logs

accessLog:
  bufferingSize: 100
  fields:
    headers:
      defaultMode: keep
      names:
        Authorization: drop
        Cookie: drop

api:
  dashboard: true
  insecure: true  # chỉ bind 127.0.0.1:8088 trong compose — KHÔNG expose

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls: {}
      # Entrypoint-level middleware: applies to MỌI router (red-team #2)
      # Thứ tự chain: IP whitelist chặn trước → security-headers áp response còn lại
      # ipallowlist-internal: 6 IP cố định, còn lại → 403 (tương đương nginx allow/deny all)
      middlewares:
        - ipallowlist-internal@file
        - security-headers@file

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: authway-auth_edge
  file:
    directory: /etc/traefik/dynamic
    watch: true

