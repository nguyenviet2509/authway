name: authway-auth

networks:
  # Internal: app containers only talk via this network. NEVER expose to host 0.0.0.0.
  # Red-team #3: enforce internal-only binding for Postgres + Zitadel; Traefik is sole ingress.
  internal:
    driver: bridge
  edge:
    driver: bridge

volumes:
  postgres-data:
  zitadel-data:
  # v4: shared bootstrap dir — setup tạo login-client PAT, login sidecar đọc
  zitadel-bootstrap:
  traefik-acme:
  traefik-logs:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [internal]
    # NO ports: published — internal docker network only (red-team #3)
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # NOTE: Zitadel `init` command auto-creates zitadel db + user via admin creds.
    # Không cần init SQL ngoài.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zitadel-init:
    # Idempotent init: creates schema + admin
    image: ghcr.io/zitadel/zitadel:v4.15.3
    restart: "no"
    user: "0"  # v4: cần root để ghi bootstrap volume + tạo PAT file
    networks: [internal]
    command: ["init", "--config", "/zitadel-config.yaml"]
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${ZITADEL_DB_USER}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_ADMIN_USER}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
    volumes:
      - ./zitadel-config.runtime.yaml:/zitadel-config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  zitadel-setup:
    # Bootstrap default org + admin user. Runs after init.
    image: ghcr.io/zitadel/zitadel:v4.15.3
    restart: "no"
    user: "0"  # v4: cần root để ghi /zitadel/bootstrap/login-client.pat
    networks: [internal]
    command:
      - setup
      - --masterkey
      - ${ZITADEL_MASTERKEY}
      - --tlsMode
      - external
      - --config
      - /zitadel-config.yaml
      - --steps
      - /zitadel-steps.yaml
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${ZITADEL_DB_USER}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_ADMIN_USER}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNAL_DOMAIN}
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "true"
      # v4 Login V2: service-user PAT cho login sidecar gọi zitadel API
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: "Automatically Initialized IAM_LOGIN_CLIENT"
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      # v4 Login V2 feature flag — bật mặc định cho instance
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: https://${ZITADEL_EXTERNAL_DOMAIN}/ui/v2/login/
    volumes:
      - ./zitadel-config.runtime.yaml:/zitadel-config.yaml:ro
      - ./zitadel-steps.yaml:/zitadel-steps.yaml:ro
      - zitadel-bootstrap:/zitadel/bootstrap:rw
    depends_on:
      zitadel-init:
        condition: service_completed_successfully

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.3
    restart: unless-stopped
    user: "0"  # v4: align với init/setup (cùng UID xử lý bootstrap volume)
    networks: [internal, edge]
    command:
      - start
      - --masterkey
      - ${ZITADEL_MASTERKEY}
      - --tlsMode
      - external
      - --config
      - /zitadel-config.yaml
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${ZITADEL_DB_USER}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_ADMIN_USER}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNAL_DOMAIN}
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: "true"
      # v4 OIDC/SAML: redirect login flows → Login V2 sidecar
      ZITADEL_OIDC_DEFAULTLOGINURLV2: https://${ZITADEL_EXTERNAL_DOMAIN}/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: https://${ZITADEL_EXTERNAL_DOMAIN}/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: https://${ZITADEL_EXTERNAL_DOMAIN}/ui/v2/login/login?samlRequest=
    volumes:
      - ./zitadel-config.runtime.yaml:/zitadel-config.yaml:ro
      - zitadel-data:/data
    depends_on:
      zitadel-setup:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=authway-auth_edge"
      # Exclude /ui/v2/login path — route to zitadel-login sidecar instead
      - "traefik.http.routers.zitadel.rule=Host(`${ZITADEL_EXTERNAL_DOMAIN}`) && !PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.zitadel.entrypoints=websecure"
      - "traefik.http.routers.zitadel.tls=true"
      - "traefik.http.routers.zitadel.priority=100"
      # Rate-limit auth paths (red-team #14)
      - "traefik.http.routers.zitadel.middlewares=ratelimit-auth@file,security-headers@file"
      - "traefik.http.services.zitadel.loadbalancer.server.port=8080"
      - "traefik.http.services.zitadel.loadbalancer.server.scheme=h2c"
    healthcheck:
      # TLS.Enabled=false trong zitadel-config.yaml → ready dùng HTTP
      test: ["CMD", "/app/zitadel", "ready", "--config", "/zitadel-config.yaml"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # v4 Login V2 sidecar — Next.js app phục vụ /ui/v2/login/* (mới ở v4, không bundle trong binary)
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.15.3
    restart: unless-stopped
    user: "0"  # v4 official compose recommendation
    networks: [internal, edge]
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      # Inject host header + scheme cho Next.js biết public URL khi sau Traefik TLS termination
      CUSTOM_REQUEST_HEADERS: "Host:${ZITADEL_EXTERNAL_DOMAIN},X-Forwarded-Proto:https"
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    depends_on:
      zitadel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=authway-auth_edge"
      - "traefik.http.routers.zitadel-login.rule=Host(`${ZITADEL_EXTERNAL_DOMAIN}`) && PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.zitadel-login.entrypoints=websecure"
      - "traefik.http.routers.zitadel-login.tls=true"
      - "traefik.http.routers.zitadel-login.priority=250"
      - "traefik.http.routers.zitadel-login.middlewares=ratelimit-auth@file,security-headers@file"
      - "traefik.http.services.zitadel-login.loadbalancer.server.port=3000"

  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    networks: [edge]
    environment:
      # Override Docker SDK client API version để khớp daemon (>=1.40)
      DOCKER_API_VERSION: "1.43"
    ports:
      - "80:80"
      - "443:443"
      # Dashboard only reachable via local SSH tunnel — do NOT expose
      - "127.0.0.1:8088:8080"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./tls:/etc/traefik/tls:ro
      - traefik-acme:/acme
      - traefik-logs:/var/log/traefik
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Mailhog for lab/dev. In production replace with real SMTP relay creds in Zitadel config.
  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    networks: [internal]
    # SMTP 1025 reached by Zitadel via service name 'mailhog:1025'
    # Web UI not exposed publicly — SSH tunnel to view
    ports:
      - "127.0.0.1:8025:8025"
