# Zitadel runtime config
# Docs: https://zitadel.com/docs/self-hosting/manage/configure

Log:
  Level: info

# TLS terminated ở Traefik. Zitadel chạy plain HTTP internal.
# Ready healthcheck command đọc cờ này.
TLS:
  Enabled: false

# Database — config trực tiếp qua YAML thay vì env (env var injection có issue ở một số version)
# Substitute giá trị qua envsubst trong start script
Database:
  Postgres:
    Host: postgres
    Port: 5432
    Database: zitadel
    MaxOpenConns: 10
    User:
      Username: ${ZITADEL_DB_USER}
      Password: ${ZITADEL_DB_PASSWORD}
      SSL:
        Mode: disable
    Admin:
      Username: ${POSTGRES_ADMIN_USER}
      Password: ${POSTGRES_ADMIN_PASSWORD}
      SSL:
        Mode: disable

LogStore:
  Access:
    Database:
      Enabled: true
      Debounce:
        MinFrequency: 1s
        MaxBulkSize: 100

# v4: opt-out service ping telemetry (avoid leaking instance metadata)
Telemetry:
  Enabled: false

DefaultInstance:
  LoginPolicy:
    AllowUsernamePassword: true
    AllowRegister: false
    AllowExternalIDP: false
    ForceMFA: true
    ForceMFALocalOnly: true
    HidePasswordReset: true
    AllowDomainDiscovery: false
    DisableLoginWithEmail: false
    DisableLoginWithPhone: true
    SecondFactors:
      - 1
      - 2
    MultiFactors:
      - 1
    PasswordlessType: 1

  LockoutPolicy:
    MaxPasswordAttempts: 5
    ShowLockoutFailures: false

  PasswordComplexityPolicy:
    MinLength: 12
    HasLowercase: true
    HasUppercase: true
    HasNumber: true
    HasSymbol: true
