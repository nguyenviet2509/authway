# Zitadel runtime config
# Docs: https://zitadel.com/docs/self-hosting/manage/configure

Log:
  Level: info

LogStore:
  Access:
    Database:
      Enabled: true
      Debounce:
        MinFrequency: 1s
        MaxBulkSize: 100

# Default Instance settings — bootstrapped once at setup
DefaultInstance:
  LoginPolicy:
    # Red-team #9: disable self-service password/MFA reset via email — admin-mediated only
    AllowUsernamePassword: true
    AllowRegister: false
    AllowExternalIDP: false
    ForceMFA: true
    ForceMFALocalOnly: true
    HidePasswordReset: true
    AllowDomainDiscovery: false
    DisableLoginWithEmail: false
    DisableLoginWithPhone: true
    # MFA factors: TOTP + Passkey (U2F)
    SecondFactors:
      - 1  # OTP
      - 2  # U2F (Passkey)
    MultiFactors:
      - 1  # U2F with PIN (Passkey)
    PasswordlessType: 1

  # Red-team #14: lockout to slow credential stuffing
  LockoutPolicy:
    MaxPasswordAttempts: 5
    ShowLockoutFailures: false

  PasswordComplexityPolicy:
    MinLength: 12
    HasLowercase: true
    HasUppercase: true
    HasNumber: true
    HasSymbol: true

  PrivacyPolicy:
    TOSLink: ""
    PrivacyLink: ""

# SMTP — Lab: mailhog. Production: thay qua admin UI.
# Note: Zitadel SMTP cấu hình thực tế qua admin UI hoặc API sau setup.
