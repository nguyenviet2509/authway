# Dynamic middlewares — auth VPS
# Red-team #14: rate-limit auth paths to slow credential stuffing
# Red-team #2: security headers at entrypoint-level (declared in traefik.yml)

http:
  middlewares:
    # IP allow list — chỉ 5 IP văn phòng + localhost được vào, còn lại 403
    # Tương đương nginx "allow <ip>; deny all;" — Traefik ipAllowList = whitelist mặc định deny phần còn lại
    ipallowlist-internal:
      ipAllowList:
        sourceRange:
          - "123.25.21.12/32"
          - "172.31.98.188/32"
          - "115.73.218.192/32"
          - "103.57.222.245/32"
          - "118.70.127.171/32"
          - "127.0.0.1/32"
          # OpenVPN tunnel range nội bộ (client cấp IP 10.0.x.x khi connect qua VPN)
          - "10.0.0.0/8"
          # Docker bridge networks (curl/healthcheck từ chính auth-vps host)
          - "172.16.0.0/12"
          # Lab KVM bridge — app-vps gọi auth-vps để OIDC discovery
          - "192.168.122.0/24"
        # ipStrategy.depth=0 (default): dùng RemoteAddr connection thật
        # Nếu sau này đứng sau Cloudflare/LB → đổi sang depth=1 để lấy IP client từ X-Forwarded-For
        ipStrategy:
          depth: 0

    # Rate-limit Zitadel login/authorize paths (red-team #14)
    # Bao phủ cả Angular SPA console (1 lần F5 = vài chục assets + gRPC calls)
    # 300/min sustained vẫn chặn brute force; burst 600 cho SPA reload thoải mái
    ratelimit-auth:
      rateLimit:
        average: 300
        period: 1m
        burst: 600
        sourceCriterion:
          ipStrategy:
            depth: 0

    # Security headers (HSTS, X-Frame-Options, no-sniff, referrer policy)
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: false
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: strict-origin-when-cross-origin
        # Strip any incoming X-Auth-* on auth VPS (defense in depth — Zitadel doesn't read these)
        customRequestHeaders:
          X-Auth-Request-Email: ""
          X-Auth-Request-User: ""
          X-Auth-Request-Preferred-Username: ""
          X-Auth-Request-Groups: ""
          X-Forwarded-User: ""

tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305

  # Lab: self-signed cert. Generate via scripts/generate-lab-cert.sh
  certificates:
    - certFile: /etc/traefik/tls/auth.crt
      keyFile: /etc/traefik/tls/auth.key
