# /etc/nginx/conf.d/autossl.conf
# AlmaLinux 8: cp nginx.conf /etc/nginx/conf.d/autossl.conf

server {
    listen 80;
    server_name autossl.trungtq.io.vn 103.216.117.178;

    # ============================
    # IP RESTRICTION - iNET ONLY
    # ============================
    allow 123.25.21.12;
    allow 172.31.98.188;
    allow 115.73.218.192;
    allow 103.57.222.245;
    allow 118.70.127.171;
    allow 127.0.0.1;
    deny all;
    # ============================

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
