# Authway App IAP — nginx reverse proxy (alternative to Caddy)
# Dùng khi member đã có nginx setup sẵn và không muốn switch sang Caddy.
#
# Setup:
#   sudo cp nginx-alternative.conf /etc/nginx/sites-available/myapp.conf
#   sudo ln -s /etc/nginx/sites-available/myapp.conf /etc/nginx/sites-enabled/
#   # Lấy LE cert: sudo certbot --nginx -d myapp.company.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Edit `myapp.company.com` thành hostname thực tế.

server {
    listen 80;
    server_name myapp.company.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name myapp.company.com;

    # ─── TLS (Let's Encrypt qua certbot) ───
    ssl_certificate     /etc/letsencrypt/live/myapp.company.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myapp.company.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ─── Security headers ───
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    # ─── Log ───
    access_log /var/log/nginx/myapp.access.log;
    error_log  /var/log/nginx/myapp.error.log;

    # ─── Strip X-Auth-* từ client (chống spoof) ───
    # proxy_set_header với value rỗng = strip header đó khỏi upstream request.
    # PHẢI có trước proxy_pass.
    proxy_set_header X-Auth-Request-Email "";
    proxy_set_header X-Auth-Request-User "";
    proxy_set_header X-Auth-Request-Preferred-Username "";
    proxy_set_header X-Auth-Request-Groups "";
    proxy_set_header X-Forwarded-User "";

    # ─── Forward all → oauth2-proxy ───
    # oauth2-proxy tự handle /oauth2/* + forward upstream (config trong /etc/oauth2-proxy/config.cfg).
    location / {
        proxy_pass http://127.0.0.1:4180;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeout phù hợp app long-poll / SSE nếu cần
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
